name: Deploy

on:
  push:
    branches: ["main"]
permissions:
  contents: read
  packages: write
jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🟡 GHCR STEP (OVO DODAJEŠ OVDJE)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u msmidegas --password-stdin
      - name: Build and push image
        run: |
          docker build -t ghcr.io/msmidegas/homelab-web:latest ./apps
          docker push ghcr.io/msmidegas/homelab-web:latest

      - name: Clean workspace
        run: |
              rm -rf $GITHUB_WORKSPACE/apps/node_modules || true

      # 🟢 DEPLOY STEP (ZA SAD OSTAJE ISTO)
      - name: Deploy
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        run: |
          echo "Starting deployment..."

          echo "Stopping old containers..."
          docker compose down -v

          echo "Starting new containers..."
          docker compose up -d --build

          echo "Done."
