services:
  web:
    image: node:20
    working_dir: /app
    volumes:
      - ./app:/app
    command: sh -c "npm install && node index.js"
    ports:
      - "8080:3000"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
