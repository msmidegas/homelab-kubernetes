services:
  web:
    image: node:20
    working_dir: /apps
    volumes:
      - ./apps:/apps
    command: sh -c "npm install && node index.js"
    ports:
      - "8080:3000"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: $(POSTGRES_USER)
      POSTGRES_PASSWORD: $(POSTGRES_PASSWORD)
      POSTGRES_DB: $(POSTGRES_DB)
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
