apiVersion: apps/v1
kind: Deployment

metadata:
  name: homelab-web
  namespace: homelab
spec:
  replicas: 1

  selector:
    matchLabels:
      app: homelab-web

  template:
    metadata:
      labels:
        app: homelab-web

    spec:
      containers:
        - name: web

          image: ghcr.io/msmidegas/homelab-web:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"

            limits:
              memory: "512Mi"
              cpu: "500m"

          envFrom:
            - configMapRef:
                name: homelab-web-config

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB

            - name: POSTGRES_HOST
              value: db

            - name: POSTGRES_PORT
              value: "5432"
