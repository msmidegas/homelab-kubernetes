apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-web

spec:
  replicas: 1

  selector:
    matchLabels:
      app: homelab-web

  template:
    metadata:
      labels:
        app: homelab-web

    spec:
      containers:
        - name: web
          image: ghcr.io/msmidegas/homelab-web:latest
          imagePullPolicy: Always
          
          ports:
            - containerPort: 3000

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
          envFrom:
            - configMapRef:
                  name: homelab-web-config
