apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homelab-web-ingress
  namespace: homelab
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homelab-web-service
                port:
                  number: 80
